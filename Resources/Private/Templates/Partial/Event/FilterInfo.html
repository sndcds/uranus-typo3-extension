<div class="filter-info" aria-label="Aktive Filter">
    <p class="filter-info__label">Aktive Filter</p>
    <div class="filter-list">
        <f:if condition="{filter.search}">
            <span class="filter-chip">Titel: {filter.search}</span>
        </f:if>

        <f:if condition="{filter.city}">
            <span class="filter-chip">Stadt: {filter.city}</span>
        </f:if>

        <f:if condition="{filter.start}">
            <span class="filter-chip">Ab: {filter.start -> f:format.date(format: 'd.m.Y')}</span>
        </f:if>

        <f:if condition="{filter.end}">
            <span class="filter-chip">Bis: {filter.end -> f:format.date(format: 'd.m.Y')}</span>
        </f:if>

        <f:if condition="{filter.language}">
            <span class="filter-chip">Sprache: {filter.language}</span>
        </f:if>

        <f:if condition="{filter.past}">
            <span class="filter-chip">Vergangene Events</span>
        </f:if>
    </div>
</div>
